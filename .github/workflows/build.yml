name: Build Lara4 IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install ldid
      run: |
        brew install ldid

    - name: Build IPA
      run: |
        cd Lara3-fixed
        bash ipabuild.sh

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lara4-IPA
        path: Lara3-fixed/build/*.ipa
        retention-days: 30

    - name: Upload Build Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          Lara3-fixed/build/**/*.log
          Lara3-fixed/build/**/*.txt
