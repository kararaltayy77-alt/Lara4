workflows:
    lara-ipa:
      name: lara IPA
      max_build_duration: 60
      instance_type: mac_mini_m2

      triggering:
        events:
          - push
        branch_patterns:
          - pattern: main
            include: true

      environment:
        xcode: latest

      scripts:
        - name: install ldid
          script: brew install ldid

        - name: build IPA
          script: |
            chmod +x ipabuild.sh
            ./ipabuild.sh

        - name: verify IPA
          script: |
            echo "[*] IPA size:"
            ls -lh build/lara.ipa
            echo "[*] Payload contents:"
            unzip -l build/lara.ipa | grep -E "\.app/|Frameworks/" | head -30
            echo "[*] Entitlements:"
            unzip -p build/lara.ipa Payload/lara.app/lara > /tmp/lara_bin
            ldid -e /tmp/lara_bin || true

      artifacts:
        - build/lara.ipa
        - build/xcodebuild.log

      publishing:
        github_releases:
          prerelease: true
          artifact_patterns:
            - build/lara.ipa
  